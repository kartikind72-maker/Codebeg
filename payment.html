<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeBeg Premium</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#00ff41;
font-family:monospace;
padding:20px;
}

.container{
max-width:700px;
margin:40px auto;
padding:25px;
background:#050505;
border:1px solid #00ff41;
border-radius:12px;
}

h1{
text-align:center;
margin-bottom:15px;
text-shadow:0 0 10px #00ff41;
}

p{
text-align:center;
color:#8aff9c;
margin-bottom:20px;
}

form{
display:flex;
flex-direction:column;
gap:15px;
}

input,
select,
textarea{
padding:12px;
background:#000;
color:#00ff41;
border:1px solid #00ff41;
border-radius:6px;
font-family:monospace;
}

textarea{
height:120px;
resize:vertical;
}

button{
padding:12px;
background:#00ff41;
color:#000;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 15px #00ff41;
}

#success{
display:none;
text-align:center;
padding:20px;
border:1px solid #00ff41;
border-radius:10px;
}

</style>
</head>
<body>

<div class="container">

<h1>CodeBeg Premium</h1>

<p>
Fill the form and we will contact you within 2 hours.
</p>

<form id="paymentForm">

<input
type="text"
name="name"
placeholder="Your Name"
required>

<input
type="email"
name="email"
placeholder="Your Email"
required>

<input
type="tel"
name="phone"
placeholder="Mobile Number"
required>

<select
name="plan"
required>

<option value="">
Select Plan
</option>

<option>
All HTML Codes
</option>

<option>
All CSS Codes
</option>

<option>
All C Codes
</option>

<option>
All Python Codes
</option>

<option>
Complete CodeBeg Pack
</option>

</select>

<textarea
name="requirement"
placeholder="Describe your requirement..."
required></textarea>

<button type="submit">
Submit Request
</button>

</form>

<div id="success">

<h2>Request Submitted Successfully!</h2>

<p>
Thank you for contacting CodeBeg.<br><br>
We will contact you within 2 hours.
</p>

</div>

</div>

<script>

const form =
document.getElementById("paymentForm");

form.addEventListener(
"submit",
async function(e){

e.preventDefault();

const data =
new FormData(form);

const response =
await fetch(
"https://formspree.io/f/maqgqrob",
{
method:"POST",
body:data,
headers:{
'Accept':'application/json'
}
}
);

if(response.ok){

form.style.display="none";

document
.getElementById("success")
.style.display="block";

}else{

alert(
"Something went wrong. Please try again."
);

}

}
);

</script>

</body>
</html>
