<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CodeBeg - View Code</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#00ff41;
font-family:monospace;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.back-btn{
display:inline-block;
margin-bottom:20px;
padding:10px 15px;
background:#00ff41;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:6px;
}

h1{
margin-bottom:10px;
text-shadow:0 0 15px #00ff41;
}

.desc{
color:#8aff9c;
margin-bottom:20px;
}

.code-box{
background:#050505;
border:1px solid #00ff41;
border-radius:10px;
padding:20px;
overflow:auto;
white-space:pre-wrap;
word-wrap:break-word;
margin-bottom:20px;
}

.copy-btn{
padding:12px 20px;
background:#00ff41;
color:#000;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.copy-btn:hover{
box-shadow:0 0 15px #00ff41;
}

.error{
text-align:center;
font-size:20px;
padding:50px;
}

</style>
</head>
<body>

<div class="container">

<a href="index.html" class="back-btn">
← Home
</a>

<h1 id="title">
Loading...
</h1>

<p id="description" class="desc"></p>

<pre id="codeBox" class="code-box"></pre>

<button
class="copy-btn"
onclick="copyCode()">

Copy Code

</button>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const id =
params.get("id");

const codes =
JSON.parse(
localStorage.getItem("codes")
) || [];

const code =
codes[id];

if(code){

document.getElementById(
"title"
).textContent =
code.title;

document.getElementById(
"description"
).textContent =
code.description;

document.getElementById(
"codeBox"
).textContent =
code.code;

}else{

document.querySelector(
".container"
).innerHTML =

`<div class="error">

Code Not Found

</div>`;

}

function copyCode(){

const text =
document.getElementById(
"codeBox"
).textContent;

navigator.clipboard
.writeText(text);

alert(
"Code Copied!"
);

}

</script>

</body>
</html>
